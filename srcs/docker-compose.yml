version: "3.9"

services:
  nginx:
    build: ./requirements/nginx
    image: nginx
    container_name: nginx
    restart: always
    ports:
      - "443:443"
    volumes:
      - wordpress_data:/var/www/html
    depends_on:
      - wordpress
    networks:
      - inception_network

  mariadb:
    build: ./requirements/mariadb
    image: mariadb
    container_name: mariadb
    restart: always
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ../secrets/db_root_password.txt:/run/secrets/db_root_password:ro
      - ../secrets/db_password.txt:/run/secrets/db_password:ro
    networks:
      - inception_network

  wordpress:
    build: ./requirements/wordpress
    image: wordpress
    container_name: wordpress
    restart: always
    env_file:
      - .env
    ports:
      - "9000:9000"
    volumes:
      - wordpress_data:/var/www/html
      - ../secrets/db_password.txt:/run/secrets/db_password:ro
      - ../secrets/wp_admin_password.txt:/run/secrets/wp_admin_password:ro
      - ../secrets/wp_user_password.txt:/run/secrets/wp_user_password:ro
    depends_on:
      - mariadb
    networks:
      - inception_network 

networks:
  inception_network:
    driver: bridge

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ~/inception/srcs/requirements/mariadb/data
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ~/inception/srcs/requirements/wordpress/data